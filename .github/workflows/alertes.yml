name: Alertes VIE Business France

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-offers:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le repository
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Vérifier les nouvelles offres
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_vie.py

      - name: Sauvegarder les offres déjà vues
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_offers.json
          git diff --cached --quiet || git commit -m "Update seen offers"
          git push
